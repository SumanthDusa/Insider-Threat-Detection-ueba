<!DOCTYPE html>
<html>
<head>
<title>UEBA Dashboard</title>
<meta http-equiv="refresh" content="5">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#0f172a; color:white; }

/* Header */
.header {
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    padding:15px;
    border-radius:10px;
}

/* Cards */
.card {
    background:#ffffff;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

/* TABLE FIX */
.table {
    width:100% !important;
    table-layout:fixed;
}

.table th, .table td {
    text-align:center;
    padding:12px;
    white-space:nowrap;
}

.table th {
    background:#ff4b2b !important;
    color:white;
}

/* Column widths */
.table th:nth-child(1), .table td:nth-child(1){width:15%;}
.table th:nth-child(2), .table td:nth-child(2){width:15%;}
.table th:nth-child(3), .table td:nth-child(3){width:15%;}
.table th:nth-child(4), .table td:nth-child(4){width:15%;}
.table th:nth-child(5), .table td:nth-child(5){width:15%;}
.table th:nth-child(6), .table td:nth-child(6){width:15%;}

/* Hover */
.table tbody tr:hover {
    background-color: rgba(255,75,43,0.2);
}
</style>
</head>

<body class="container mt-4">

<div class="header d-flex justify-content-between">
<h3>Admin Dashboard</h3>
<div id="clock"></div>
<a href="/logout" class="btn btn-light">Logout</a>
</div>

<div class="card">
<h5> Suspicious Activities</h5>
<div class="table-responsive">
{{ table|safe }}
</div>
</div>

<div class="row">
<div class="col-md-6">
<div class="card">
<h5>👤 User Risk</h5>
<canvas id="userChart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card">
<h5>📈 Risk Trend</h5>
<canvas id="timeChart"></canvas>
</div>
</div>
</div>

<script>
// clock
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

const users = {{ users | tojson }};
const times = {{ times | tojson }};

// USER GRAPH
new Chart(document.getElementById('userChart'), {
type:'bar',
data:{
labels:users.map(u=>u.user),
datasets:[{
label:"Risk Score",
data:users.map(u=>u.risk_score),
backgroundColor:'#ff4b2b'
}]
},
options:{scales:{y:{min:0,max:10}}}
});

// TIME GRAPH
new Chart(document.getElementById('timeChart'), {
type:'line',
data:{
labels:times.map(t=>t.time),
datasets:[{
label:"Risk Trend",
data:times.map(t=>t.risk_score),
borderColor:'#00c6ff',
fill:true
}]
},
options:{scales:{y:{min:0,max:10}}}
});
</script>

</body>
</html>
